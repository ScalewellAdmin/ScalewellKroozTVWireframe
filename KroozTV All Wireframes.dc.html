<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #e2e0d8; }
</style>
<script>
(function(){
  if (window.__wfRevealInit) return; window.__wfRevealInit = true;
  function setup(){
    var st = document.createElement('style');
    st.textContent = '.wf-reveal{opacity:0;transform:translateY(26px);transition:opacity .7s cubic-bezier(.2,.6,.2,1),transform .7s cubic-bezier(.2,.6,.2,1);} .wf-reveal.wf-in{opacity:1;transform:none;}';
    document.head.appendChild(st);
    var els=[];
    function frames(){
      var out=[];
      [].slice.call(document.querySelectorAll('div')).forEach(function(d){
        var cs=getComputedStyle(d);
        if((cs.boxShadow||'').indexOf('7px 9px')>-1) out.push(d);
        else if(cs.borderTopWidth==='7px' && cs.borderTopStyle==='solid' && cs.borderRadius!=='0px') out.push(d);
      });
      return out;
    }
    function check(){
      var vh=window.innerHeight||document.documentElement.clientHeight;
      for(var i=0;i<els.length;i++){
        var el=els[i]; if(el.__in) continue;
        var r=el.getBoundingClientRect();
        if(r.height>0 && r.top < vh*0.90 && r.bottom > 0){ el.__in=true; el.classList.add('wf-in'); }
      }
    }
    function scan(){
      frames().forEach(function(fr){
        [].slice.call(fr.children).forEach(function(ch){
          if(ch.nodeType!==1 || ch.__wfr) return;
          if(ch.offsetHeight && ch.offsetHeight<40) return;
          ch.__wfr=true; ch.classList.add('wf-reveal'); els.push(ch);
        });
      });
      check();
    }
    function onScroll(){ check(); }
    window.addEventListener('scroll',onScroll,{passive:true});
    document.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll,{passive:true});
    scan();
    [120,400,900,1600].forEach(function(ms){ setTimeout(check,ms); });
    var t; var mo = new MutationObserver(function(){ clearTimeout(t); t=setTimeout(function(){ scan(); check(); },90); });
    mo.observe(document.body,{childList:true,subtree:true});
  }
  if(document.body) setup(); else window.addEventListener('DOMContentLoaded',setup);
})();
</script>
</helmet>

<div style="min-height:100vh;background:#e2e0d8;font-family:'Patrick Hand',sans-serif;color:#222;">

  <!-- MASTER SELECTOR -->
  <div style="position:sticky;top:0;z-index:100;background:#14141A;color:#fff;border-bottom:3px solid #FF6A2C;padding:12px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:inline-flex;flex-direction:column;align-items:stretch;">
        <div style="display:flex;gap:3px;margin:0 0 2px 9px;"><span style="width:4px;height:4px;border-radius:50%;background:#fff;"></span><span style="width:4px;height:4px;border-radius:50%;background:#fff;"></span></div>
        <div style="border:2.5px solid #fff;border-radius:9px;padding:4px 11px 5px;"><span style="font-family:'Clash Display',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;line-height:1;color:#fff;">KROOZ<span style="color:#FF6A2C;">TV</span></span></div>
        <div style="display:flex;justify-content:center;gap:30px;margin-top:-1px;"><span style="width:8px;height:5px;background:#fff;border-radius:0 0 3px 3px;"></span><span style="width:8px;height:5px;background:#fff;border-radius:0 0 3px 3px;"></span></div>
        <div style="text-align:center;font-size:9px;font-weight:700;letter-spacing:.3em;color:#fff;margin-top:2px;white-space:nowrap;">TOP RATED IPTV</div>
      </div>
      <div style="width:1px;height:34px;background:#3a3a42;"></div>
      <span style="font-size:12px;color:#9A9AA2;max-width:120px;line-height:1.3;">Wireframe Explorer · Desktop / Mobile inside</span>
    </div>
    <div style="flex:1;"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <sc-for list="{{ pageTabs }}" as="tab" hint-placeholder-count="8">
        <button onClick="{{ tab.onClick }}" style="{{ tab.style }}">{{ tab.label }}</button>
      </sc-for>
      <span style="width:2px;align-self:stretch;background:#3a3a42;margin:0 5px;border-radius:1px;"></span>
      <span style="font-family:'Caveat',cursive;font-size:14px;color:#FF9159;align-self:center;white-space:nowrap;">explore ↓</span>
      <sc-for list="{{ exploreTabs }}" as="tab" hint-placeholder-count="4">
        <button onClick="{{ tab.onClick }}" style="{{ tab.style }}">{{ tab.label }}</button>
      </sc-for>
    </div>
  </div>

  <sc-if value="{{ showHome }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Home Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showSub }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Subscription Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showReseller }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Reseller Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showTutorial }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Tutorial Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showTrial }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Free Trial Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showContact }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Contact Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showAffiliate }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Affiliate Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showAbout }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV About Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showPolicies }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Policies Wireframe" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showMotifs }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Brand Motifs" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showBrand }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Brand System" hint-size="100%,100%"></dc-import>
  </sc-if>
  <sc-if value="{{ showHero }}" hint-placeholder-val="{{ true }}">
    <dc-import name="KroozTV Hero Options" hint-size="100%,100%"></dc-import>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { page: 'home' };
  renderVals() {
    const cur = this.state.page;
    const base = { padding: '8px 15px', border: '2px solid #3a3a42', background: 'transparent', fontFamily: "'Caveat', cursive", fontWeight: 700, fontSize: '17px', cursor: 'pointer', borderRadius: '9px', color: '#cfcfd6', lineHeight: 1, whiteSpace: 'nowrap' };
    const active = Object.assign({}, base, { background: '#FF6A2C', color: '#fff', border: '2px solid #F2540B' });
    const defs = [
      ['home', 'Home'],
      ['sub', 'Subscription'],
      ['reseller', 'Reseller'],
      ['tutorial', 'Tutorial'],
      ['trial', 'Free Trial'],
      ['contact', 'Contact'],
      ['affiliate', 'Affiliate'],
      ['about', 'About'],
      ['policies', 'Policies'],
      ['motifs', 'Motifs'],
      ['brand', 'Brand System'],
      ['hero', 'Hero ×3'],
    ];
    const mk = (d) => ({
      label: d[1],
      onClick: () => { this.setState({ page: d[0] }); try { window.scrollTo(0, 0); } catch (e) {} },
      style: cur === d[0] ? active : base,
    });
    const pageTabs = defs.slice(0, 9).map(mk);
    const exploreTabs = defs.slice(9).map(mk);
    return {
      pageTabs, exploreTabs,
      showHome: cur === 'home',
      showSub: cur === 'sub',
      showReseller: cur === 'reseller',
      showTutorial: cur === 'tutorial',
      showTrial: cur === 'trial',
      showContact: cur === 'contact',
      showAffiliate: cur === 'affiliate',
      showAbout: cur === 'about',
      showPolicies: cur === 'policies',
      showMotifs: cur === 'motifs',
      showBrand: cur === 'brand',
      showHero: cur === 'hero',
    };
  }
}
</script>
</body>
</html>
